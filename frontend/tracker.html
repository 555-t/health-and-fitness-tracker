<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker | Log Workout</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .tracker-container {
            max-width: 900px;
            margin: auto;
        }

        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <!-- Simple Navbar Template -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-dumbbell text-success"></i> Fitness Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="tracker.html">Workouts</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.htm">Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container tracker-container mb-5">
        <div class="row g-4">
            <!-- Log Workout Form -->
            <div class="col-md-5">
                <div class="card card-custom p-4">
                    <h4 class="mb-3"><i class="fa-solid fa-plus-circle text-primary"></i> Log Workout</h4>
                    <form id="workoutForm">
                        <div class="mb-3">
                            <label for="activity" class="form-label">Activity Type</label>
                            <select class="form-select" id="activity" required>
                                <option value="" selected disabled>Select Activity</option>
                                <option value="Running">Running</option>
                                <option value="Cycling">Cycling</option>
                                <option value="Weightlifting">Weightlifting</option>
                                <option value="Yoga">Yoga</option>
                                <option value="Swimming">Swimming</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="duration" class="form-label">Duration (minutes)</label>
                            <input type="number" class="form-control" id="duration" placeholder="e.g. 45" min="1"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-2">Add Workout</button>
                    </form>
                </div>
            </div>

            <!-- Workout History Table -->
            <div class="col-md-7">
                <div class="card card-custom p-4">
                    <h4 class="mb-3"><i class="fa-solid fa-list-ul text-info"></i> Workout History</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Activity</th>
                                    <th>Duration</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="workoutTableBody">
                                <!-- Dynamic rows will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Empty State Message -->
                    <div id="emptyState" class="text-center text-muted mt-3" style="display: none;">
                        <p>No workouts logged yet. Start exercising!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>

    <!-- Member 4 Phase 1 Logic -->
    <script>
        // Array to store workout data (Phase 1 Requirement)
        let workouts = [];

        // DOM Elements
        const workoutForm = document.getElementById('workoutForm');
        const workoutTableBody = document.getElementById('workoutTableBody');
        const emptyState = document.getElementById('emptyState');

        // Initial check for empty state
        updateTable();

        // Add Workout
        workoutForm.addEventListener('submit', function (e) {
            e.preventDefault();

            // Get form values
            const activity = document.getElementById('activity').value;
            const duration = document.getElementById('duration').value;
            const date = document.getElementById('date').value;

            // Simple validation to ensure fields are filled
            if (!activity || !duration || !date) {
                alert("Please fill in all fields.");
                return;
            }

            // Create workout object
            const newWorkout = {
                id: Date.now(), // Unique ID for deletion
                activity: activity,
                duration: duration,
                date: date
            };

            // Push to array
            workouts.push(newWorkout);
            console.log("Current Workouts:", workouts);

            // Reset form and update UI
            workoutForm.reset();
            updateTable();
        });

        // Function to update the HTML table
        function updateTable() {
            // Clear current table rows
            workoutTableBody.innerHTML = '';

            // Check if array is empty to show empty state message
            if (workouts.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }

            // Render array elements as table rows
            workouts.forEach((workout, index) => {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td>${workout.date}</td>
                    <td><span class="badge bg-secondary">${workout.activity}</span></td>
                    <td>${workout.duration} min</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteWorkout(${workout.id})">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </td>
                `;
                workoutTableBody.appendChild(tr);
            });
        }

        // Function to delete workout (Phase 1 Requirement)
        function deleteWorkout(id) {
            // Filter out the workout with matching ID
            workouts = workouts.filter(workout => workout.id !== id);
            console.log("Workout deleted. Updated Workouts:", workouts);

            // Re-render table
            updateTable();
        }
    </script>
</body>

</html>
