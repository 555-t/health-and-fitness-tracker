<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Get Buff'd</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Raleway:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/templatemo-training-studio.css">
  <link rel="stylesheet" href="css/style.css"> 
</head>

<body class="profile-page">

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-dumbbell mr-2" style="color: var(--orange);"></i>Get<span>Buff'd</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon" style="color: white;"><i class="fas fa-bars"></i></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home mr-2"></i>Home</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        <i class="fas fa-layer-group mr-2"></i>Features
                    </a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" href="tracker.html"><i class="fas fa-clipboard-list mr-2"></i>Workout Tracker</a>
                        <a class="dropdown-item" href="nutrition.html"><i class="fas fa-apple-alt mr-2"></i>Nutrition Planner</a>
                        <a class="dropdown-item" href="progress.html"><i class="fas fa-chart-line mr-2"></i>Progress Charts</a>
                        <div class="dropdown-divider" style="border-color: rgba(255,255,255,0.1);"></div>
                        <a class="dropdown-item active" href="profile.html"><i class="fas fa-user-cog mr-2"></i>My Profile</a>
                    </div>
                </li>
                <li class="nav-item ml-lg-4 mt-3 mt-lg-0">
                    <a class="btn btn-login w-100" href="login.html"><i class="fas fa-sign-in-alt mr-2"></i>Log In</a>
                </li>
            </ul>
        </div>
    </div>
</nav>


  <div class="profile-banner" id="top">
    <div class="video-overlay header-text">
      <div class="container mt-5">
        <h2 class="text-center" style="color: #2b2e36; font-weight: bold;">Profile Management</h2>

        <!-- View Profile Card -->
        <div class="card p-4 mt-4 view-profile">
          <div class="d-flex align-items-center">
            
            <!-- Avatar -->
            <img src="assets/images/avatar.jpg" alt="Profile Avatar" 
                class="rounded-circle mr-4" width="120" height="120">

            <!-- Profile Details -->
            <div>
              <h3 style="font-weight: bold;">My Profile</h3>
              <p><strong>Name:</strong> <span id="viewName">Batrisyia</span></p>
              <p><strong>Age:</strong> <span id="viewAge">22</span></p>
              <p><strong>Weight:</strong> <span id="viewWeight">55 kg</span></p>
            </div>

          </div>
        </div>

        <!-- Actions Card -->
        <div class="card p-4 mt-4">

          <!-- Update Profile -->
          <form id="profileForm" class="profile-form">
            <h3 style="font-weight: bold;">Update Profile</h3>

            <div class="row">
              <!-- Avatar upload/remove -->
              <div class="col-md-4 text-center mt-4">
                <img id="profileAvatar" src="assets/img/avatar.png" alt="Profile Avatar" 
                    class="rounded-circle mb-2" width="120" height="120">

                <div class="d-flex justify-content-center mb-2">
                  <!-- Upload button -->
                  <div class="mr-2">
                    <label for="uploadAvatar" class="btn btn-primary btn-sm">Upload</label>
                    <input type="file" id="uploadAvatar" accept="image/*" class="d-none">
                  </div>

                  <!-- Remove button -->
                  <div>
                    <button type="button" class="btn btn-danger btn-sm" id="removeAvatar">Remove</button>
                  </div>
                </div>

              </div>

              <div class="col-md-8">
                <!-- Name -->
                <div class="mb-3">
                  <label for="name">Name</label>
                  <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>

                <!-- Age -->
                <div class="mb-3">
                  <label for="age">Age</label>
                  <input type="number" id="age" class="form-control" placeholder="Enter your age" required>
                </div>

                <!-- Weight -->
                <div class="mb-3">
                  <label for="weight">Weight</label>
                  <input type="number" id="weight" class="form-control" placeholder="Enter your weight" required>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-modern w-100 mt-3" id="updateBtn">Update</button>
          </form>

          <hr>

          <!-- Change Password -->
          <form id="changePassForm" class="profile-form">
            <h3 style="font-weight: bold;">Change Password</h3>
            <input type="password" id="newPassword" class="form-control mb-3" placeholder="New Password" required>
            <button type="submit" class="btn btn-modern w-100 btn-primary" id="changePassBtn">Change Password</button>
          </form>

          <hr>

          <!-- Account Options -->
          <div class="delete-section">
            <h3 style="font-weight: bold;">Account Options</h3>
            <div class="d-flex">
              <button type="button" class="btn btn-modern btn-warning flex-fill mr-2" id="deactivateBtn">Deactivate Account</button>
              <button type="button" class="btn btn-modern btn-danger flex-fill" id="deleteBtn">Delete Account</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
