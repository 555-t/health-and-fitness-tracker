<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Register page for Get Buff'd">
  <title>GetBuff'd - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Raleway:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/templatemo-training-studio.css">
  <style>
    :root {
      --black: #2b2e35;
      --green: #5be662;
      --orange: #ff4d00;
      --white: #f7f7f7;
      --dark-card: #22252b;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--black);
      color: var(--white);
      margin: 0;
    }

    .navbar-custom {
      background-color: rgba(43, 46, 53, 0.98);
      border-bottom: 2px solid var(--orange);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .navbar-custom .navbar-brand {
      font-family: 'Raleway', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--white) !important;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .navbar-custom .navbar-brand span {
      color: var(--orange);
    }

    .navbar-custom .nav-link {
      color: var(--white) !important;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 16px !important;
      transition: color 0.3s ease;
    }

    .navbar-custom .nav-link:hover,
    .navbar-custom .nav-link.active {
      color: var(--orange) !important;
    }

    .navbar-custom .btn-login {
      background-color: transparent;
      color: var(--orange);
      border: 2px solid var(--orange);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 30px;
      padding: 8px 24px;
      transition: all 0.3s ease;
    }

    .navbar-custom .btn-login:hover {
      background-color: var(--orange);
      color: var(--white);
      box-shadow: 0 0 10px rgba(255, 77, 0, 0.5);
    }

    .auth-page {
      min-height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.55);
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(18, 24, 34, 0.55);
      z-index: 1;
    }

    .auth-page .container {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100%;
    }

    .login-card {
      width: auto;
      max-width: 520px;
      min-width: 320px;
      min-height: 580px;
      background-color: #ffffff;
      border: 1px solid rgba(34, 37, 43, 0.12);
      border-radius: 28px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.18);
      padding: 40px 32px;
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-card h2 {
      color: #22252b;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .login-card p.lead {
      color: #4d5869;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .login-card .section-heading {
      text-align: center;
    }

    .login-card .form-group {
      margin-bottom: 22px;
    }

    .login-card .form-control {
      background: #f7f7f7;
      border: 1px solid rgba(34, 37, 43, 0.12);
      color: #22252b;
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card .form-control:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(70, 189, 76, 0.12);
      outline: none;
    }

    .login-card .form-control::placeholder {
      color: rgba(34, 37, 43, 0.45);
    }

    .login-card label {
      color: #22252b;
      font-weight: 600;
    }

    .login-card .btn-primary {
      width: 100%;
      background: var(--orange);
      border: 1px solid var(--orange);
      padding: 14px;
      margin-top: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 12px;
    }

    .login-card .btn-primary:hover {
      background: var(--green);
      border-color: var(--green);
      color: var(--black);
    }

    .login-card .auth-info {
      margin-top: 28px;
      color: rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .login-card .auth-info a {
      color: var(--orange);
      font-weight: 700;
    }
    .brand-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-header .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255, 77, 0, 0.15);
      display: grid;
      place-items: center;
      color: var(--orange);
      font-size: 1.3rem;
    }

    .brand-header .brand-title {
      color: var(--white);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .section-heading img {
      margin-bottom: 18px;
      max-width: 120px;
    }

    #loginMessage {
      min-height: 24px;
      font-weight: 700;
    }

    @media (max-width: 767px) {
      .auth-page {
        padding: 40px 0;
      }

      .login-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fa-solid fa-dumbbell mr-2" style="color: var(--orange);"></i>Get<span>Buff'd</span>
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home mr-2"></i>Home</a></li>
          <li class="nav-item ml-lg-4 mt-3 mt-lg-0">
                <a class="btn btn-login w-100" href="login.html"><i class="fas fa-sign-in-alt mr-2"></i>Log In</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <video autoplay muted loop playsinline class="bg-video">
        <source src="assets/images/woman-running.mp4" type="video/mp4" />
    </video>
    <div class="bg-overlay"></div>

  <section class="section auth-page">
    <div class="container">
      <div class="login-card mx-auto">
        <div class="section-heading text-left">
          <h2>Create your account</h2>
          <img src="assets/images/line-dec.png" alt="decoration">
          <p class="lead">Register with your details to start your fitness journey and access your dashboard.</p>
        </div>
        <form id="registerForm">
          <div class="form-group">
            <label for="registerName">Username</label>
            <input type="text" class="form-control" id="registerName" name="name" placeholder="Enter your username" required>
          </div>
          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input type="email" class="form-control" id="registerEmail" name="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input type="password" class="form-control" id="registerPassword" name="password" placeholder="Create a password" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Register</button>
          <div id="registerMessage" class="mt-4 text-center"></div>
        </form>
        <p class="auth-info">Already have an account? <a href="login.html">Log in</a></p>
      </div>
    </div>
  </section>

  <script src="assets/js/jquery-2.1.0.min.js"></script>
  <script src="assets/js/popper.js"></script>
  <script src="assets/js/bootstrap.min.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
      event.preventDefault();
      var name = document.getElementById('registerName').value.trim();
      var email = document.getElementById('registerEmail').value.trim();
      var password = document.getElementById('registerPassword').value.trim();
      var confirmPassword = document.getElementById('confirmPassword').value.trim();
      var messageEl = document.getElementById('registerMessage');
      if (!name || !email || !password || !confirmPassword) {
        messageEl.innerHTML = '<span style="color:#f04d4d; font-weight:600;">Please fill in all fields.</span>';
        return;
      }
      if (password !== confirmPassword) {
        messageEl.innerHTML = '<span style="color:#f04d4d; font-weight:600;">Passwords do not match. Please try again.</span>';
        return;
      }
      messageEl.innerHTML = '<span style="color:#5be662; font-weight:600;">Welcome, ' + name + '! Your account has been created.</span>';
      document.getElementById('registerForm').reset();
    });
  </script>
</body>

</html>
